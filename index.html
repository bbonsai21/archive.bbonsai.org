<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bonsai Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            background: #fff; color: #333; 
            font-family: "Courier New", Courier, monospace; 
            max-width: 800px; margin: 40px auto; padding: 20px;
        }
        #content { line-height: 1.5; }
        a { color: #0000ee; text-decoration: none; }
        a:hover { text-decoration: underline; background: #ffff00; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; font-size: 1.2rem; }
        /* Style for your numbered list */
        ol { padding-left: 20px; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1><a href="https://bbonsai.org">PERSONAL</a> ARCHIVE</h1>
    <div id="content">Loading archive...</div>

    <script>
        fetch('archive.md?t=' + new Date().getTime())
            .then(response => response.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            });
    </script>
</body>
</html>
